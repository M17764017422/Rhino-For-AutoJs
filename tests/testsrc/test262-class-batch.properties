# ES2022 Class Test262 分批测试配置
# 根据测试分类清单设计分批分片方案

# ============================================================
# 批次定义说明
# ============================================================
# Batch 0: Negative Tests - 负面测试（预期失败的测试）
# Batch 1: ES2022 Core - ES2022 Class 核心特性 (~500 测试)
# Batch 2: ES6 Core - ES6 Class 核心特性 (~100 测试)
# Batch 3: Elements - elements 目录测试 (~500 测试)
# Batch 4: Destructuring - 解构赋值测试 (1281 测试, 分4片)
# Batch 5: Generators - 生成器测试 (1156 测试, 分4片)
# Batch 6: Async - 异步测试 (~700 测试, 分2片)
# Batch 7: Others - 其他测试 (~500 测试)
# Batch 8: ES2023+ - ES2023+ 特性测试
# ============================================================

# ============================================================
# Batch 0: Negative Tests (预期失败的测试)
# 优先级: 特殊 (用于统计，不计入失败率)
# 预计测试数: ~460
# ============================================================
batch0.name=Negative Tests
batch0.priority=0
batch0.description=负面测试 - 期望抛出错误的测试用例

# 负面测试分类
# Phase: parse/early/runtime/resolution
# Type: SyntaxError/ReferenceError/TypeError/RangeError

# Parse Phase - 语法解析阶段错误
batch0.parse.description=解析阶段错误 (词法/语法分析)
batch0.parse.patterns=\
  **/expected-early-error*.js,\
  **/invalid-syntax*.js,\
  **/syntax-error*.js,\
  **/*-duplicate-privatenames.js,\
  **/fields-duplicate-*.js

# Early Phase - 早期错误（编译时语义检查）
batch0.early.description=早期错误 (编译时语义检查)
batch0.early.patterns=\
  **/early-error*.js,\
  **/super-before-super*.js

# Runtime Phase - 运行时错误
batch0.runtime.description=运行时错误 (TDZ, 类型错误等)
batch0.runtime.patterns=\
  **/use-before-*.js,\
  **/tdz-*.js,\
  **/brand-check*.js

# 排除正面测试
batch0.exclude=\
  **/valid-*.js,\
  **/normal-*.js

# ============================================================
# Batch 1: ES2022 Class Core Features
# 优先级: 最高
# 预计测试数: ~500
# ============================================================
batch1.name=ES2022 Core
batch1.priority=1
batch1.description=ES2022 Class 核心特性测试
batch1.features=\
  class-fields-public,\
  class-fields-private,\
  class-methods-private,\
  class-static-fields-public,\
  class-static-fields-private,\
  class-static-methods-private,\
  class-static-block

# Batch 1 包含目录
batch1.dirs=\
  language/expressions/class/elements,\
  language/statements/class/elements,\
  language/statements/class/static-init-*.js,\
  built-ins/ClassStaticBlockDefinition,\
  built-ins/ClassStringLookup

# Batch 1 排除目录
batch1.exclude=\
  **/dstr/**,\
  **/decorator/**,\
  **/async-method/**,\
  **/async-gen-method/**,\
  **/gen-method/**

# ============================================================
# Batch 2: ES6 Class Core Features
# 优先级: 高
# 预计测试数: ~100
# ============================================================
batch2.name=ES6 Core
batch2.priority=2
batch2.description=ES6 Class 核心特性测试 (subclass, super, definition)
batch2.dirs=\
  language/statements/class/subclass-builtins,\
  language/statements/class/super,\
  language/statements/class/definition

# ============================================================
# Batch 3: Elements Directory
# 优先级: 高
# 预计测试数: ~500
# ============================================================
batch3.name=Elements
batch3.priority=3
batch3.description=Class elements 目录测试
batch3.dirs=\
  language/expressions/class/elements,\
  language/statements/class/elements

# Batch 3 排除 (已在 Batch 1 中包含的核心特性)
batch3.exclude=\
  **/private-field-*.js,\
  **/private-method-*.js,\
  **/static-init-*.js,\
  **/decorator/**,\
  **/accessor*.js

# ============================================================
# Batch 4: Destructuring Binding Tests
# 优先级: 中
# 预计测试数: 1281
# 分片: 4 片 (每片 ~320 测试)
# ============================================================
batch4.name=Destructuring
batch4.priority=4
batch4.description=解构赋值测试 (ES6 特性)
batch4.shards=4

# Batch 4 分片目录
batch4.shard1.dirs=language/statements/class/dstr
batch4.shard1.pattern=dstr/meth-*.js,dstr/meth-static-*.js
batch4.shard2.dirs=language/statements/class/dstr
batch4.shard2.pattern=dstr/gen-meth-*.js,dstr/gen-meth-static-*.js
batch4.shard3.dirs=language/statements/class/dstr
batch4.shard3.pattern=dstr/async-gen-meth-*.js,dstr/async-gen-meth-static-*.js
batch4.shard4.dirs=language/statements/class/dstr
batch4.shard4.pattern=dstr/private-*.js,dstr/async-private-*.js

# ============================================================
# Batch 5: Generators Tests
# 优先级: 中
# 预计测试数: 1156
# 分片: 4 片 (每片 ~290 测试)
# ============================================================
batch5.name=Generators
batch5.priority=5
batch5.description=生成器测试 (ES6 特性)
batch5.shards=4

batch5.shard1.dirs=\
  language/statements/class/gen-method,\
  language/statements/class/gen-method-static
batch5.shard1.pattern=*.js

batch5.shard2.dirs=language/statements/class/dstr
batch5.shard2.pattern=gen-meth-ary-*.js,gen-meth-obj-*.js

batch5.shard3.dirs=language/statements/class/dstr
batch5.shard3.pattern=gen-meth-dflt-ary-*.js,gen-meth-dflt-obj-*.js

batch5.shard4.dirs=language/statements/class/dstr
batch5.shard4.pattern=gen-meth-static-ary-*.js,gen-meth-static-obj-*.js,gen-meth-static-dflt-*.js

# ============================================================
# Batch 6: Async Tests
# 优先级: 中
# 预计测试数: ~700
# 分片: 2 片 (每片 ~350 测试)
# ============================================================
batch6.name=Async
batch6.priority=6
batch6.description=异步测试 (ES2017/ES2018 特性)
batch6.shards=2

batch6.shard1.dirs=\
  language/statements/class/async-method,\
  language/statements/class/async-method-static
batch6.shard1.features=async-functions

batch6.shard2.dirs=\
  language/statements/class/async-gen-method,\
  language/statements/class/async-gen-method-static
batch6.shard2.features=async-iteration

# ============================================================
# Batch 7: Other Tests
# 优先级: 低
# 预计测试数: ~500
# ============================================================
batch7.name=Others
batch7.priority=7
batch7.description=其他测试

batch7.dirs=\
  language/statements/class/syntax,\
  language/statements/class/method,\
  language/statements/class/method-static,\
  language/statements/class/name-binding,\
  language/statements/class/arguments,\
  language/statements/class/strict-mode

batch7.files=\
  language/statements/class/cpn-*.js,\
  language/statements/class/ident-name-*.js,\
  language/statements/class/scope-*.js,\
  language/statements/class/params-dflt-*.js

# ============================================================
# 超出 ES2022 范围的测试 (单独批次)
# ============================================================
batch8.name=ES2023+ Features
batch8.priority=99
batch8.description=ES2023+ 特性测试 (装饰器, 自动存取器)
batch8.dirs=\
  language/statements/class/decorator,\
  language/expressions/class/decorator
batch8.files=\
  language/statements/class/elements/grammar-field-accessor.js,\
  language/statements/class/elements/field-definition-accessor-no-line-terminator.js
