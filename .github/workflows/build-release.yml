name: Build and Release

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      short_sha: ${{ steps.version.outputs.short_sha }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      
    - name: Get version info
      id: version
      run: |
        VERSION=$(grep "^version=" gradle.properties | cut -d'=' -f2)
        SHORT_SHA=$(git rev-parse --short HEAD)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
        
    - name: Build rhino core (for Android)
      run: ./gradlew :rhino:jar --no-configuration-cache
      
    - name: Build rhino-all (for Desktop)
      run: ./gradlew :rhino-all:shadowJar --no-configuration-cache
      
    - name: Build rhino-android-all (for Android, no JLine)
      run: ./gradlew :rhino-all:shadowJarAndroid --no-configuration-cache
      
    - name: List built JARs
      run: |
        echo "=== Rhino Core (Android compatible) ==="
        ls -la rhino/build/libs/
        echo "=== Rhino All (Desktop, includes JLine) ==="
        ls -la rhino-all/build/libs/
        echo "=== Rhino Android All (no JLine, optimized for Android) ==="
        ls -la rhino-all/build/libs/rhino-android-all-*.jar || echo "Not found"
      
    - name: Upload rhino core JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: rhino-core
        path: rhino/build/libs/rhino-*.jar
        retention-days: 30
        
    - name: Upload rhino-all JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: rhino-all
        path: rhino-all/build/libs/rhino-all-*.jar
        retention-days: 30
        
    - name: Upload rhino-android-all JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: rhino-android-all
        path: rhino-all/build/libs/rhino-android-all-*.jar
        retention-days: 30

  publish-github-packages:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      
    - name: Publish all modules to GitHub Packages
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        ./gradlew :rhino:publish --no-configuration-cache
        ./gradlew :rhino-all:publish --no-configuration-cache

  create-release:
    needs: [build, publish-github-packages]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Download rhino core artifact
      uses: actions/download-artifact@v4
      with:
        name: rhino-core
        path: ./artifacts/core
        
    - name: Download rhino-all artifact
      uses: actions/download-artifact@v4
      with:
        name: rhino-all
        path: ./artifacts/all
        
    - name: Download rhino-android-all artifact
      uses: actions/download-artifact@v4
      with:
        name: rhino-android-all
        path: ./artifacts/android-all
        
    - name: List artifacts
      run: |
        echo "=== Rhino Core (Android) ==="
        ls -la ./artifacts/core/
        echo "=== Rhino All (Desktop) ==="
        ls -la ./artifacts/all/
        echo "=== Rhino Android All (no JLine) ==="
        ls -la ./artifacts/android-all/
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ needs.build.outputs.version }}-${{ needs.build.outputs.short_sha }}
        name: Rhino for AutoJs ${{ needs.build.outputs.version }} (${{ needs.build.outputs.short_sha }})
        body: |
          ## Rhino for AutoJs ${{ needs.build.outputs.version }}
          
          基于 [mozilla/rhino](https://github.com/mozilla/rhino)，保留 AutoJs 兼容性定制修改。
          
          ---
          
          ### 包含文件
          
          | 文件 | 大小 | 用途 | 说明 |
          |------|------|------|------|
          | `rhino-*.jar` | ~1.8 MB | Android 轻量版 | 仅核心引擎，无外部依赖 |
          | `rhino-android-all-*.jar` | ~2.0 MB | Android 完整版 | 含 XML/Tools/兼容层，无 JLine |
          | `rhino-all-*.jar` | ~2.8 MB | 桌面应用 | 完整功能，含 JLine 终端 |
          
          ---
          
          ### 模块内容
          
          **rhino-*.jar (核心模块)**
          - JavaScript 引擎核心
          - 原生对象 (Array, Object, Function, Promise, etc.)
          - 正则表达式引擎
          - 类型化数组
          - AST 解析器
          - LiveConnect (Java 互操作)
          
          **rhino-android-all-*.jar / rhino-all-*.jar (完整模块)**
          - 核心模块 +
          - `rhino-xml`: E4X XML 支持
          - `rhino-tools`: Shell、Debugger、Compiler
          - `rhino-compat`: API 兼容层 (WrapFactoryCompat, NativeFunctionAdapter)
          - `rhino-all` 特有: JLine 3.30.6 终端 (不含 FFM)
          
          ---
          
          ### 保留的定制修改
          
          - **VMBridge**: Android 7.x 兼容性（无 VarHandle）
          - **IRFactory**: StackOverflowError 修复
          - **MemberBox**: 公共访问器和 VMBridge 调用
          - **SlotMapOwner**: synchronized 替代 VarHandle
          - **NativeJavaObject**: legacyStaticType 构造函数
          - **ScriptableObject**: toScriptableObject 方法
          - **ImporterTopLevel**: String 参数支持
          
          ---
          
          ### 使用方法
          
          **Android 项目 (Gradle)**
          ```groovy
          // 轻量版 - 仅核心引擎
          implementation files('libs/rhino-2.0.0-SNAPSHOT.jar')
          
          // 完整版 - 包含 XML/Tools/兼容层
          implementation files('libs/rhino-android-all-2.0.0-SNAPSHOT.jar')
          ```
          
          **桌面应用**
          ```bash
          java -jar rhino-all-2.0.0-SNAPSHOT.jar
          ```
          
          **GitHub Packages (Maven)**
          ```xml
          <repository>
            <id>github</id>
            <url>https://maven.pkg.github.com/M17764017422/Rhino-For-AutoJs</url>
          </repository>
          
          <dependency>
            <groupId>org.mozilla.javascript</groupId>
            <artifactId>rhino</artifactId>
            <version>2.0.0-SNAPSHOT</version>
          </dependency>
          ```
          
          ---
          
          ### 兼容性
          
          | 平台 | 最低版本 |
          |------|---------|
          | Android | API 21+ (Android 5.0) |
          | Java Desktop | Java 11+ |
          
          > **注意**: JLine FFM 终端已排除，兼容 Java 17-21。Java 22+ 可使用原生 FFM 终端。
        files: |
          ./artifacts/core/*.jar
          ./artifacts/all/*.jar
          ./artifacts/android-all/*.jar
        draft: false
        prerelease: false