name: Rhino CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  

permissions:
  contents: read
  actions: write

env:
  GRADLE_OPTS: "--enable-native-access=ALL-UNNAMED"

jobs:
  # Build - compile check (~2 min)
  build:
    runs-on: ubuntu-latest
    name: Build
    timeout-minutes: 10
    steps:
      - name: Check out Rhino
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493 # v4.2.2
      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'adopt'
      - name: Compile
        run: ./gradlew compileJava compileTestJava
      - name: Upload build cache
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            **/build
          key: build-${{ github.sha }}

  # Rhino core module tests (~2 min)
  unit-rhino:
    runs-on: ubuntu-latest
    name: Rhino Module Tests
    needs: build
    timeout-minutes: 25
    steps:
      - name: Check out Rhino
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493 # v4.2.2
      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'adopt'
      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            **/build
          key: build-${{ github.sha }}
      - name: Run rhino tests
        run: ./gradlew :rhino:test
      - name: Upload results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: ${{ always() }}
        with:
          name: reports-rhino
          path: 'rhino/build/reports'

  # Rhino-tools module tests (~1 min)
  unit-rhino-tools:
    runs-on: ubuntu-latest
    name: Rhino-Tools Module Tests
    needs: build
    timeout-minutes: 25
    steps:
      - name: Check out Rhino
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493 # v4.2.2
      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'adopt'
      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            **/build
          key: build-${{ github.sha }}
      - name: Run rhino-tools tests
        run: ./gradlew :rhino-tools:test
      - name: Upload results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: ${{ always() }}
        with:
          name: reports-rhino-tools
          path: 'rhino-tools/build/reports'

  # Rhino-compat module tests (~1 min)
  unit-rhino-compat:
    runs-on: ubuntu-latest
    name: Rhino-Compat Module Tests
    needs: build
    timeout-minutes: 25
    steps:
      - name: Check out Rhino
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493 # v4.2.2
      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'adopt'
      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            **/build
          key: build-${{ github.sha }}
      - name: Run rhino-compat tests
        run: ./gradlew :rhino-compat:test
      - name: Upload results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: ${{ always() }}
        with:
          name: reports-rhino-compat
          path: 'rhino-compat/build/reports'

  # Tests module (excluding Test262) (~2 min)
  unit-tests:
    runs-on: ubuntu-latest
    name: Tests Module (no Test262)
    needs: build
    timeout-minutes: 25
    steps:
      - name: Check out Rhino
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493 # v4.2.2
      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'adopt'
      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            **/build
          key: build-${{ github.sha }}
      - name: Run tests (excluding Test262)
        run: ./gradlew :tests:testWithoutTest262
      - name: Upload results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: ${{ always() }}
        with:
          name: reports-tests
          path: 'tests/build/reports'

  # Test262 suite - runs independently with longer timeout (~12 min)
  test262:
    runs-on: ubuntu-latest
    name: Test 262 Verification
    timeout-minutes: 60
    steps:
      - name: Check out Rhino with submodules
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493 # v4.2.2
        with:
          submodules: 'recursive'
          fetch-depth: 1
      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: |
            11
            21
          distribution: 'adopt'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-test262-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
      - name: Check current state of test262.properties
        id: hashBefore
        run: echo "hash=${{ hashFiles('./tests/testsrc/test262.properties') }}" >> $GITHUB_OUTPUT
      - name: Run test262 tests
        # Currently Java 11 is required to have a reproducible result
        env:
          RHINO_TEST_JAVA_VERSION: "11"
        run: ./gradlew :tests:test262 -DupdateTest262properties
      - name: Upload results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: ${{ always() }}
        with:
          name: reports-test262
          path: 'tests/build/reports'
      - name: Check updated state of test262.properties
        id: hashAfter
        run: echo "hash=${{ hashFiles('./tests/testsrc/test262.properties') }}" >> $GITHUB_OUTPUT
      - name: Compare test262 results
        run: |
          if [ "${{ steps.hashBefore.outputs.hash }}" != "${{ steps.hashAfter.outputs.hash }}" ]; then
            echo "The test262.properties file was not updated properly."
            echo "Please follow the instructions in tests/README.md to update it."
            git --no-pager diff ./tests/testsrc/test262.properties
            exit 1
          else
            echo "The test262.properties file is up to date."
          fi

  # Test various combinations of building and testing (excludes Test262)
  # 支持 JDK 17-21，确保 spotless 兼容性
  matrix-test:
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - java-version: "17"
            test-java-version: "17"
            name: "Java 17 Build and Test"
            multithread: false
          - java-version: "21"
            test-java-version: "21"
            name: "Java 21 Build and Test"
            multithread: false
          - java-version: "21"
            test-java-version: "21"
            name: "Java 21 Multithreaded"
            multithread: true
          - java-version: "21"
            test-java-version: "17"
            name: "Java 21 Build, Java 17 Test"
            multithread: false
    name: ${{ matrix.name }}
    timeout-minutes: 25
    steps:
    - name: Check out Rhino
      uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493 # v4.2.2
    - name: Set up Java
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: |
          ${{ matrix.test-java-version }}
          ${{ matrix.java-version }}
        distribution: 'adopt'
    - name: Restore build cache
      uses: actions/cache/restore@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          **/build
        key: build-${{ github.sha }}
    - name: Build and test ${{ matrix.name }} (excludes Test262)
      env:
        RHINO_TEST_JAVA_VERSION: ${{ matrix.test-java-version }}
      run: >-
        ./gradlew :rhino:test :rhino-tools:test :rhino-compat:test :tests:testWithoutTest262 ${{ matrix.multithread && '-Drhino.useThreadSafeObjectsByDefault=true' || '' }}
    - name: Upload results ${{ matrix.name }}
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: ${{ always() }}
      with:
        name: reports-java-${{ matrix.java-version }}-${{ matrix.test-java-version}}${{ matrix.multithread }}
        path: '*/build/reports'
